# ============================================================
#  JUnit Platform – configuración de salida en consola
# ============================================================

# Activa el TreePrintingListener: imprime un árbol jerárquico con
# los @DisplayName reales de cada clase, @Nested y test individual.
#
# Ejemplo de salida:
#
#   CalculatorService – Unit Tests
#   ├─ add()
#   │  ├─ ✔  suma dos positivos
#   │  ├─ ✔  suma dos negativos
#   │  ├─ ✔  suma positivo con negativo
#   │  ├─ ✔  suma con cero devuelve el mismo número
#   │  └─ ✔  suma de decimales con precisión
#   ├─ divide()
#   │  ├─ ✔  divide dos positivos
#   │  └─ ✔  BRANCH: divisor = 0 → lanza DivisionByZeroException
#   └─ ...
#
junit.platform.listeners.uid.tracking.enabled=true

# Listener que imprime el árbol de resultados con @DisplayName
# Valores posibles: none, flat, tree, verbose
junit.platform.reporting.output.dir=target/junit-platform-reports
junit.platform.output.capture.stdout=true
junit.platform.output.capture.stderr=true
